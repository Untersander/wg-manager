# https://taskfile.dev
version: "3"

vars:
  BINARY: wg-manager
  IMAGE: wg-manager

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all

  # ── Development ──

  templ:
    desc: Generate templ templates
    sources:
      - "internal/views/*.templ"
    generates:
      - "internal/views/*_templ.go"
    cmds:
      - go tool templ generate

  build:
    desc: Build the Go binary locally
    deps: [templ]
    cmds:
      - go build -o bin/{{.BINARY}} ./cmd/wg-manager

  test:
    desc: Run Go tests
    deps: [templ]
    cmds:
      - go test ./...

  test-verbose:
    desc: Run Go tests with verbose output
    deps: [templ]
    cmds:
      - go test -v ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  fmt:
    desc: Run gofmt
    cmds:
      - gofmt -w .

  tidy:
    desc: Run go mod tidy
    cmds:
      - go mod tidy

  lint:
    desc: Run vet + fmt check
    cmds:
      - task: vet
      - task: fmt
      - golangci-lint run --timeout 5m

  check:
    desc: Run tidy, lint, and build
    cmds:
      - task: tidy
      - task: templ
      - task: lint
      - task: build

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/

  # ── Docker ──

  up:
    desc: Build and start docker-compose stack
    cmds:
      - docker compose up --build -d

  down:
    desc: Stop docker-compose stack
    cmds:
      - docker compose down

  restart:
    desc: Restart docker-compose stack
    cmds:
      - task: down
      - task: up

  logs:
    desc: Tail docker-compose logs
    cmds:
      - docker compose logs -f

  ps:
    desc: Show running containers
    cmds:
      - docker compose ps

  docker-buildx-setup:
    desc: Set up Docker Buildx for multi-arch builds
    cmds:
      - docker buildx rm --keep-state local || true
      - docker buildx create --use --name local
      - docker buildx inspect --bootstrap

  docker-build:
    desc: Build Container images using Buildx
    cmds:
      - docker buildx use local
      - docker buildx build -t {{.IMAGE}} --load .

  docker-build-multiarch:
    desc: Build multi-arch Container images using Buildx
    cmds:
      - docker buildx use local
      - docker buildx build --platform linux/amd64,linux/arm64 -t {{.IMAGE}} .

  watch:
    desc: Watch for changes and rebuild using docker compose watch
    cmds:
      - docker compose watch
